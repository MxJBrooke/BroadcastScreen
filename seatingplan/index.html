<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seating Planner</title>

<style>
:root {
  --color-x: transparent;
  --bg: #FBF9F7;
  --primary: #4A4A4A;
  --secondary: #D9D5D1;

  --seat-default: #03a4bd;
  --seat-active: #6003ac;
  --seat-corridor: #4A4A4A;

  --color-blue: #03a4bd;
  --color-green: #00C38A;
  --color-purple: #6003ac;
  --color-red: #c90101;
  --color-orange: #FFA500;
  --color-yellow: #FFD700;
  --color-pink: #d4016a;

  --text-dark: var(--primary);
  --text-light: var(--bg);
  --border: var(--primary);
}

body { font-family: Consolas, monospace; margin:0; background:var(--bg); font-size:20px; }
.header { height:80px; background:var(--primary); border-bottom:2px solid var(--primary); display:flex; align-items:center; justify-content:center; position:relative; }
.logo{font-family: Consolas; color: var(--secondary)}
.nav { position:absolute; right:10px; display:flex; gap:10px; }
.nav button { padding:14px 18px; border-radius:8px; border:1px solid var(--border); background:var(--secondary); cursor:pointer; font-weight:bold; font-size:18px; }
.main { display:flex; height:calc(100vh - 80px); flex-direction:row; }
.left { flex:0 0 250px; padding:20px; border-right:2px solid var(--border); background:var(--bg); display:flex; flex-direction:column; justify-content:space-between; gap:10px; }
.right { flex:1; padding:20px; overflow:auto; }
.flyout { flex:0 0 250px; border-left:2px solid var(--border); background:var(--bg); padding:20px; display:flex; flex-direction:column; gap:10px; }
.grid { display:grid; gap:14px; }
.seat { padding:20px; border-radius:12px; text-align:center; color:var(--text-dark); font-size:18px; cursor:pointer; }
.seat.active { color:var(--text-dark); }
.seat.empty { color:transparent; }
.seat.corridor { color:transparent; background:var(--seat-corridor); cursor:default; }
.seat input, .seat textarea { width:95%; margin-top:5px; font-size:16px; padding:6px; }
.seat textarea { resize: vertical; min-height:40px; overflow:auto; }
.controls { margin-top:8px; display:flex; justify-content:center; gap:12px; }
.sidebar-btn { display:flex; justify-content:center; align-items:center; margin:6px 0; padding:14px; border-radius:8px; border:1px solid var(--secondary); background:var(--secondary); cursor:pointer; font-weight:bold; width:100%; font-size:17px; box-sizing:border-box; }
.row-col-controls { display:flex; justify-content:space-between; gap:8px; margin-bottom:10px; }
.file-input { display:none; }
.color-btn { width:32px; height:32px; border:2px solid var(--primary); border-radius:8px; cursor:pointer; padding:0; transition: transform 0.2s; flex-shrink:0; }
.color-btn:hover { transform:scale(1.1); }
.podium { display:flex; align-items:flex-end; justify-content:center; gap:20px; margin-top:40px; flex-wrap:wrap; }
.place { width:180px; text-align:center; border-radius:10px 10px 0 0; padding:16px; font-size:18px; }
.first { height:240px; background:var(--color-blue); }
.second { height:190px; background:var(--color-green); }
.third { height:160px; background:var(--color-purple); }
.others { margin-top:30px; text-align:center; display:flex; flex-direction:column; align-items:center; }
.others div { margin:8px 0; font-size:20px; }
.color-btn.selected { transform: scale(1.3); border-color: var(--text-dark); }

@media (max-width:768px){
  .main { flex-direction:column; }
  .left { flex:0 0 auto; width:100%; border-right:none; border-bottom:2px solid var(--border); padding:10px; }
  .right { padding:10px; }
  .nav button, .sidebar-btn { font-size:20px; padding:16px 20px; }
  .seat { padding:24px; font-size:20px; }
  .seat input, .seat textarea { font-size:18px; padding:8px; }
  .place { width:140px; padding:18px; font-size:20px; }
}

@media (min-width: 0px) {
  .grid .seat {
    min-height: 100px; /* adjust as needed */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .grid .seat .controls {
    margin-top: auto; /* push +/- buttons to bottom */
    display: flex;
    justify-content: center;
    gap: 8px;
  }
}

</style>
</head>
<body>
<div class="header">
  <h1 class="logo">&lt;MxBrooke.co.uk&gt;</h1>
  <div class="nav">
    <button onclick="setView('setup')">Setup</button>
    <button onclick="setView('present')">Present</button>
    <button onclick="setView('leaderboard')">Leaderboard</button>
  </div>
</div>

<div class="main">

  <div class="left" id="sidebar">
    <div>
      <h3>Setup Controls</h3>
      <div class="row-col-controls">
        <button class="sidebar-btn" onclick="addRow()">+ Row</button>
        <button class="sidebar-btn" onclick="removeRow()">- Row</button>
      </div>
      <div class="row-col-controls">
        <button class="sidebar-btn" onclick="addCol()">+ Column</button>
        <button class="sidebar-btn" onclick="removeCol()">- Column</button>
      </div>
    </div>
    <div style="margin-top:20px;">
      <h4>Seat Color</h4>
      <div style="display:flex; flex-wrap:wrap; gap:5px;">
        <button class="sidebar-btn color-btn" data-color="--color-red" style="background:var(--color-red);" onclick="setSelectedColor('--color-red')"></button>
        <button class="sidebar-btn color-btn" data-color="--color-orange" style="background:var(--color-orange);" onclick="setSelectedColor('--color-orange')"></button>
        <button class="sidebar-btn color-btn" data-color="--color-yellow" style="background:var(--color-yellow);" onclick="setSelectedColor('--color-yellow')"></button>
        <button class="sidebar-btn color-btn" data-color="--color-green" style="background:var(--color-green);" onclick="setSelectedColor('--color-green')"></button>
        <button class="sidebar-btn color-btn" data-color="--color-blue" style="background:var(--color-blue);" onclick="setSelectedColor('--color-blue')"></button>
        <button class="sidebar-btn color-btn" data-color="--color-purple" style="background:var(--color-purple);" onclick="setSelectedColor('--color-purple')"></button>
        <button class="sidebar-btn color-btn" data-color="--color-pink" style="background:var(--color-pink);" onclick="setSelectedColor('--color-pink')"></button>
        <button class="sidebar-btn color-btn" data-color="--color-x" style="background:var(--bg); color:var(--primary); font-weight:bold;" onclick="setSelectedColor('--color-x')">X</button>
      </div>
    </div>
    <div style="margin-top:auto;">
      <button class="sidebar-btn" onclick="exportCSV()">Export CSV</button>
      <button class="sidebar-btn" onclick="document.getElementById('fileInput').click()">Import CSV</button>
      <input id="fileInput" class="file-input" type="file" onchange="importCSV(event)">
    </div>
  </div>

  <div class="right" id="app"></div>

  <div class="flyout" id="studentFlyout">
    <h3>Students</h3>
    <textarea id="studentListInput" placeholder="Enter names (one per line)" style="width:100%; height:120px;"></textarea>
    <button class="sidebar-btn" onclick="loadStudentList()">Load</button>
    <div id="studentList" style="margin-top:10px; display:flex; flex-direction:column; gap:6px;"></div>
  </div>

</div>

<script>
let selectedColor = '--seat-default';
let draggedSeat = null;
let draggedStudent = null;
let studentPool = [];

function setSelectedColor(color) {
  selectedColor = color;
  document.querySelectorAll('.color-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.getAttribute('data-color') === color);
  });
}

let view = 'setup';
let grid = [
  [{ name: 'Inky', points: 5, notes: 'Blue ghost', color: '--color-blue' },
   { name: 'NA', points: 0, notes: '', color: '--seat-corridor' },
   { name: 'Blinky', points: 8, notes: 'Red ghost', color: '--color-red' }],
  [{ name: 'Bonny', points: 3, notes: 'Pink ghost', color: '--color-pink' },
   { name: 'NA', points: 0, notes: '', color: '--seat-corridor' },
   { name: 'Clyde', points: 4, notes: 'Orange ghost', color: '--color-orange' }]
];

function setView(v) { view = v; render(); }
function addRow() { const cols = grid[0]?.length || 1; grid.push(Array.from({ length: cols }, () => ({ name: '', points: 0, notes: '', color: '--seat-default' }))); render(); }
function removeRow() { if (grid.length > 0) { grid.pop(); render(); } }
function addCol() { if (grid.length === 0) { grid.push([{ name: '', points: 0, notes: '', color: '--seat-default' }]); } else grid.forEach(row => row.push({ name: '', points: 0, notes: '', color: '--seat-default' })); render(); }
function removeCol() { grid.forEach(row => { if (row.length > 0) row.pop(); }); grid = grid.filter(row => row.length > 0); render(); }

function loadStudentList() {
  const input = document.getElementById('studentListInput').value;
  studentPool = input.split('\n').map(n => n.trim()).filter(Boolean);
  renderStudentList();
}

function renderStudentList() {
  const container = document.getElementById('studentList');
  container.innerHTML = '';
  studentPool.forEach((name, index) => {
    const div = document.createElement('div');
    div.style.display = 'flex'; div.style.justifyContent = 'space-between'; div.style.alignItems = 'center';
    const span = document.createElement('span'); span.textContent = name;
    const removeBtn = document.createElement('button'); removeBtn.textContent = 'X'; removeBtn.style.marginLeft = '5px';
    removeBtn.onclick = () => { studentPool.splice(index, 1); renderStudentList(); };
    div.appendChild(span); div.appendChild(removeBtn);
    div.className = 'sidebar-btn';
    div.draggable = true;
    div.ondragstart = () => { draggedStudent = { name, index }; draggedSeat = null; };
    container.appendChild(div);
  });
}

// Lighten color helper
function lightenColor(hex, percent) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) & 0xFF;
  let g = (num >> 8) & 0xFF;
  let b = num & 0xFF;
  r = Math.round(r + (255 - r) * percent);
  g = Math.round(g + (255 - g) * percent);
  b = Math.round(b + (255 - b) * percent);
  return `rgb(${r},${g},${b})`;
}

function render() {
  const app = document.getElementById('app');
  const sidebar = document.getElementById('sidebar');
  const flyout = document.getElementById('studentFlyout');
  sidebar.style.display = (view === 'setup') ? 'flex' : 'none';
  flyout.style.display = (view === 'setup') ? 'flex' : 'none';
  app.innerHTML = '';

  if (view === 'leaderboard') {
    let students = grid.flat().filter(s => s.name && s.name !== 'NA');
    students.sort((a, b) => b.points - a.points);
    const scores = [...new Set(students.map(s => s.points))].sort((a, b) => b - a);
    const podiumScores = scores.slice(0, 3);
    const podium = document.createElement('div'); podium.className = 'podium';
    podiumScores.forEach((score, i) => {
      const tied = students.filter(s => s.points === score);
      const div = document.createElement('div');
      div.className = `place ${i === 0 ? 'first' : i === 1 ? 'second' : 'third'}`;
      div.innerHTML = `<strong>${i + 1}${['st','nd','rd'][i]}</strong><br>` + tied.map(s => s.name).join('<br>') + `<br><strong>${score}</strong>`;
      podium.appendChild(div);
    });
    app.appendChild(podium);
    const othersDiv = document.createElement('div'); othersDiv.className = 'others';
    students.forEach(s => { if (s.points < Math.min(...podiumScores.concat([Infinity]))) { const div = document.createElement('div'); div.textContent = `${s.name} - ${s.points}`; othersDiv.appendChild(div); } });
    app.appendChild(othersDiv);
    return;
  }

  if (grid.length === 0) return;
  const gridDiv = document.createElement('div'); gridDiv.className = 'grid';
  gridDiv.style.gridTemplateColumns = `repeat(${grid[0].length},1fr)`;

  grid.forEach(row => { row.forEach(s => {
    const seat = document.createElement('div'); seat.className = 'seat';
    if (s.name === 'NA') { seat.classList.add('corridor'); seat.style.background = 'var(--seat-corridor)'; seat.style.cursor = 'default'; }
    else seat.style.background = `var(${s.color || '--seat-default'})`;

    if (view === 'setup') {
      seat.draggable = (s.name !== 'NA');
      seat.ondragstart = () => { draggedSeat = s; draggedStudent = null; };
      seat.ondragover = e => e.preventDefault();
      seat.ondrop = () => {
        if (draggedSeat && draggedSeat !== s) { if (s.name === 'NA' || draggedSeat.name === 'NA') return; const temp = {...s}; Object.assign(s, draggedSeat); Object.assign(draggedSeat, temp); render(); return; }
        if (draggedStudent) { if (s.name === 'NA') return; const old = s.name; s.name = draggedStudent.name; s.points = 0; s.notes = ''; if(old) studentPool.push(old); studentPool.splice(draggedStudent.index,1); draggedStudent=null; render(); renderStudentList(); }
      };

      const nameInput = document.createElement('input'); nameInput.value = s.name; nameInput.placeholder = 'Name'; nameInput.maxLength = 20;
      nameInput.oninput = e => s.name = e.target.value;
      seat.appendChild(nameInput);

      const notesInput = document.createElement('textarea'); notesInput.value = s.notes; notesInput.placeholder = 'Notes';
      notesInput.oninput = e => s.notes = e.target.value;
      notesInput.style.height = 'auto'; notesInput.style.minHeight = '40px';
      notesInput.addEventListener('input', function(){ this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
      if(s.name && s.name !== 'NA') seat.appendChild(notesInput);

      // Remove X button
      if(s.name && s.name !== 'NA'){
        const removeBtn = document.createElement('button'); removeBtn.textContent = 'X'; removeBtn.style.marginTop = '5px';
        removeBtn.onclick = (e) => { e.stopPropagation(); studentPool.push(s.name); s.name=''; s.points=0; s.notes=''; render(); renderStudentList(); };
        seat.appendChild(removeBtn);
      }

      if(s.name !== 'NA'){
        seat.onclick = () => { if(selectedColor === '--color-x') return; s.color = selectedColor; seat.style.background = `var(${selectedColor})`; };
      }

    } else {
      // Present view
      if(s.name === 'NA'){
        seat.innerHTML = ''; seat.style.background = 'var(--seat-corridor)';
      } else if(s.name){
        seat.innerHTML = `<strong>${s.name}</strong><br><strong>Points: ${s.points}</strong>`;
        seat.style.background = `var(${s.color || '--seat-default'})`;
        seat.style.color = 'black';

        const controls = document.createElement('div'); controls.className = 'controls';
        const plus = document.createElement('button'); plus.textContent = '+'; plus.onclick = ()=>{ s.points++; render(); };
        const minus = document.createElement('button'); minus.textContent = '-'; minus.onclick = ()=>{ s.points--; render(); };
        plus.style.fontSize='20px'; plus.style.padding='8px 12px';
        minus.style.fontSize='20px'; minus.style.padding='8px 12px';
        controls.appendChild(plus); controls.appendChild(minus);
        seat.appendChild(controls);

      } else {
        // Empty non-NA seat: pastel version
        let seatColor = getComputedStyle(document.documentElement).getPropertyValue(s.color || '--seat-default').trim();
        seat.style.background = lightenColor(seatColor, 0.7);
        seat.innerHTML = '';
      }
    }

    gridDiv.appendChild(seat);
  }); });

  app.appendChild(gridDiv);
  renderStudentList();
}

// CSV export/import
function exportCSV(){
  let rows = [];
  grid.forEach((row,r)=>{ row.forEach((s,c)=>{ rows.push([r,c,s.name,s.points,s.notes,s.color||'--seat-default'].join(',')); }); });
  const blob = new Blob([rows.join('\n')],{type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'seating.csv'; a.click();
}

function importCSV(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    const lines = reader.result.split('\n'); let newGrid = [];
    lines.forEach(line=>{
      const [r,c,name,points,notes,color] = line.split(',');
      if(!newGrid[r]) newGrid[r]=[];
      newGrid[r][c]={name:name||'', points:+points||0, notes:notes||'', color:color||'--seat-default'};
    });
    grid = newGrid; render();
  };
  reader.readAsText(file);
}

render();
</script>
</body>
</html>
