<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLF Projects Home</title>

<style>
/* ----------------- Global ----------------- */
body {
    font-family: Consolas, monospace;
    margin: 0;
    background-color: #f5f5f5;
    color: #000;
    overflow-x: hidden;
}

/* ----------------- Header (Same as your project) ----------------- */
.header {
    width: 100%;
    height: 80px;
    background-color: #333;
    border-bottom: 2px solid #222;
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    top: 0;
    z-index: 20;
}

.header img {
    height: 60px;
    cursor: pointer;
}

/* ----------------- Main ----------------- */
#mainContainer {
    margin-top: 120px;
    min-height: calc(100vh - 80px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* ----------------- Button Grid ----------------- */
#buttonGrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 30px;
    width: 80%;
    max-width: 900px;
}

.projectButton {
    background-color: #A81769;
    color: #fff;
    border: none;
    padding: 40px 20px;
    font-size: 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
}

.projectButton:hover {
    background-color: #08B1DB;
    transform: translateY(-5px);
}

/* ----------------- Dark Mode ----------------- */
body.dark-mode {
    background-color: #121212;
    color: #fff;
}

body.dark-mode .projectButton {
    background-color: #08B1DB;
}

body.dark-mode .projectButton:hover {
    background-color: #F5CC1B;
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
    <img src="https://clf.uk/wp-content/uploads/CLF-Logo-Transparent-White-Text.png"
         alt="CLF Logo"
         onclick="toggleTheme()">
</div>

<!-- Main -->
<div id="mainContainer">
    <h1>Project Dashboard</h1>

    <div id="buttonGrid">
        <button class="projectButton" onclick="location.href='networks/'">
            networks
        </button>
    </div>
</div>

<script>
function toggleTheme() {
    document.body.classList.toggle('dark-mode');
}
</script>

</body>
</html>
