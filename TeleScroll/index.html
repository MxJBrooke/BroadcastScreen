<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter</title>

<style>
/* ----------------- Global ----------------- */
body {
    font-family: Consolas, monospace;
    margin: 0;
    background-color: #f5f5f5;
    color: #000;
    overflow: hidden;
}

/* ----------------- Header ----------------- */
.header {
    width: 100%;
    height: 80px;
    background-color: #333;
    border-bottom: 2px solid #222;
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    top: 0;
    z-index: 20;
}

.header img {
    height: 60px;
    cursor: pointer;
}

/* ----------------- Sidebar ----------------- */
#panel {
    position: fixed;
    top: 80px;
    left: 0;
    width: 280px;
    height: calc(100vh - 80px);
    background: #222;
    border-right: 2px solid #555;
    padding: 20px;
    box-sizing: border-box;
    overflow-y: auto;
    transition: transform .3s ease;
    color: #fff;
    z-index: 10;
}

#panel.collapsed {
    transform: translateX(-100%);
}

#panel label {
    margin-top: 15px;
    display: block;
    font-weight: bold;
}

#panel input,
#panel select,
#panel button {
    width: 100%;
    margin-top: 5px;
    margin-bottom: 10px;
    padding: 6px;
    background-color: #333;
    color: #fff;
    border: 1px solid #555;
    font-family: Consolas, monospace;
    box-sizing: border-box;
}

/* Toggle Button */
#togglePanel {
    position: fixed;
    left: 0;
    bottom: 110px;
    z-index: 25;
    background: grey;
    color: #fff;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
}

/* ----------------- Main ----------------- */
#main {
    margin-top: 80px;
    margin-left: 280px;
    height: calc(100vh - 80px);
    padding: 20px;
    box-sizing: border-box;
    transition: margin-left .3s ease;
}

#display {
    height: 100%;
    background: #fff;
    border: 2px solid #ccc;
    border-radius: 8px;
    padding: 20px;
    overflow-y: auto;
    font-size: 1.6em;
    line-height: 2em;
}

.line {
    margin-bottom: 12px;
}

.active {
    font-weight: bold;
}

/* Dark Mode */
body.dark-mode {
    background-color: #121212;
    color: #fff;
}

body.dark-mode #display {
    background-color: #222;
    border-color: #333;
}
</style>
</head>

<body>

<div class="header">
    <img src="https://clf.uk/wp-content/uploads/CLF-Logo-Transparent-White-Text.png"
         alt="CLF Logo"
         onclick="toggleTheme()">
</div>

<div id="panel">
<h2>Settings</h2>

<label>Choose File</label>
<input type="file" id="fileInput" accept=".txt">

<label>Search Text</label>
<input type="text" id="searchBox" placeholder="Type text to find...">
<button id="searchBtn">Go</button>

<label>Font Family</label>
<select id="fontFamily">
  <option value="Consolas">Consolas</option>
  <option value="Arial">Arial</option>
  <option value="Helvetica">Helvetica</option>
</select>

<label>Font Size</label>
<input type="range" id="fontSize" min="1" max="10" step="0.1" value="1.6">

<label>Line Height</label>
<input type="range" id="lineHeight" min="1" max="10" step="0.1" value="2">

<label>Letter Spacing</label>
<input type="range" id="kerning" min="0" max="10" step="0.5" value="0">

<label>Active Color</label>
<input type="color" id="textColor" value="#A81769">

<label>Defocus Color</label>
<input type="color" id="defocusColor" value="#b0b0b0">

<label>Background Color</label>
<input type="color" id="bgColor" value="#ffffff">

<label>Scroll Speed</label>
<input type="range" id="scrollSpeed" min="1" max="20" value="10">
</div>

<button id="togglePanel">☰</button>

<div id="main">
  <div id="display"></div>
</div>

<audio id="clickSound">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<script>
function toggleTheme() {
    document.body.classList.toggle('dark-mode');
}

//ELEMENTS
const display = document.getElementById("display");
const fileInput = document.getElementById("fileInput");
const searchBox = document.getElementById("searchBox");
const searchBtn = document.getElementById("searchBtn");
const toggleBtn = document.getElementById("togglePanel");
const panel = document.getElementById("panel");
const main = document.getElementById("main");

//SETTINGS
const fontFamilyInput=document.getElementById('fontFamily');
const fontSizeInput=document.getElementById('fontSize');
const lineHeightInput=document.getElementById('lineHeight');
const kerningInput=document.getElementById('kerning');
const bgColorInput=document.getElementById('bgColor');
const textColorInput=document.getElementById('textColor');
const defocusColorInput=document.getElementById('defocusColor');
const scrollSpeedInput=document.getElementById('scrollSpeed');
const clickSound=document.getElementById('clickSound');

let lines = [];
let currentIndex = 0;
let scrollFactor = parseInt(scrollSpeedInput.value);

let fileObj=null, reader=null;
let fileOffset=0, fileSize=0;
const chunkSize = 50000;

function playClick(){
  clickSound.currentTime=0;
  clickSound.play().catch(()=>{});
}

function splitSentences(t){
  return t.replace(/\n+/g," ").split(/(?<=[.!?])\s+/).filter(x=>x.trim());
}

function loadNextChunk(cb){
  if(fileOffset >= fileSize){
    if(cb) cb();
    return;
  }

  const blob = fileObj.slice(fileOffset, fileOffset + chunkSize);
  reader = new FileReader();
  reader.onload = e=>{
    const newLines = splitSentences(e.target.result || "");
    if(newLines.length > 0) lines = lines.concat(newLines);
    fileOffset += chunkSize;
    render();
    if(cb) cb();
  };
  reader.readAsText(blob);
}

function render(){
  const baseSize = parseFloat(fontSizeInput.value);
  display.innerHTML = "";

  lines.forEach((text,i)=>{
    const div = document.createElement("div");
    div.classList.add("line");
    div.textContent = (i+1) + ". " + text;

    if(i === currentIndex){
      div.classList.add("active");
      div.style.color = textColorInput.value;
    } else {
      div.style.color = defocusColorInput.value;
    }

    div.style.fontSize = baseSize + "em";
    display.appendChild(div);
  });
}

function updateScroll(){
  const active = document.querySelector(".active");
  if(active){
    const target = active.offsetTop - display.clientHeight/2 + active.clientHeight/2;
    const dist = target - display.scrollTop;
    const t = (20 - scrollFactor + 1)/20;
    const ease = t*t*t;
    display.scrollTop += dist * ease;
  }
  requestAnimationFrame(updateScroll);
}
updateScroll();

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowDown"){
    if(currentIndex < lines.length-1){
      currentIndex++;
      render();
    } else {
      loadNextChunk(()=>{ currentIndex++; render(); });
    }
  }
  if(e.key==="ArrowUp" && currentIndex>0){
    currentIndex--;
    render();
  }
});

function jumpToMatch(q){
  q=q.toLowerCase();
  const idx=lines.findIndex(l=>l.toLowerCase().includes(q));
  if(idx!==-1){
    currentIndex=idx;
    render();
    return true;
  }
  return false;
}

function progressiveSearch(q){
  function attempt(){
    if(jumpToMatch(q)) return;
    if(fileOffset < fileSize){
      loadNextChunk(attempt);
    } else {
      alert("Not found.");
    }
  }
  attempt();
}

searchBtn.addEventListener("click",()=>{
  const q=searchBox.value.trim();
  if(q.length>0) progressiveSearch(q);
});

fileInput.addEventListener("change",()=>{
  fileObj=fileInput.files[0];
  if(!fileObj) return;
  fileSize=fileObj.size;
  fileOffset=0;
  lines=[];
  currentIndex=0;
  loadNextChunk();
});

[fontFamilyInput,fontSizeInput,lineHeightInput,kerningInput,bgColorInput,textColorInput,defocusColorInput,scrollSpeedInput]
.forEach(el=>{
  el.addEventListener("input",()=>{
    playClick();
    display.style.fontFamily=fontFamilyInput.value;
    display.style.lineHeight=lineHeightInput.value+"em";
    display.style.letterSpacing=kerningInput.value+"px";
    display.style.backgroundColor=bgColorInput.value;
    scrollFactor=parseInt(scrollSpeedInput.value);
    render();
  });
});

toggleBtn.addEventListener("click",()=>{
  panel.classList.toggle("collapsed");
  main.style.marginLeft = panel.classList.contains("collapsed") ? "0" : "280px";
});
</script>

</body>
</html>
