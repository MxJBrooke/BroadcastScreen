<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Picker Fruit Machine</title>

<style>
:root {
    --confetti-size: 48px;
    --picker-scale: 1;
}

body {
    font-family: Consolas, monospace;
    margin: 0;
    background-color: #f5f5f5;
    color: #000;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Header */
.header {
    width: 100%;
    height: 80px;
    background-color: #333;
    border-bottom: 2px solid #222;
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    top: 0;
    z-index: 20;
}

.header img {
    height: 60px;
    cursor: pointer;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

#pickStudentHeaderBtn {
    position: absolute;
    left: 40px;
    background-color: #555;
    color: #fff;
    border: none;
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

/* Sidebar */
#sidebar {
    position: fixed;
    top: 80px;
    left: 0;
    width: 250px;
    height: calc(100vh - 80px);
    background: #222;
    border-right: 2px solid #555;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    z-index: 10;
    color: #fff;
}

#sidebar textarea,
#sidebar button,
#sidebar input[type="range"] {
    background-color: #333;
    color: #fff;
    border: 1px solid #555;
    padding: 5px;
    margin-bottom: 10px;
    font-family: Consolas, monospace;
    width: 100%;
}

#sidebar label {
    font-size: 14px;
    margin-top: 10px;
}

/* Sidebar toggle button */
#toggleSidebar {
    position: fixed;
    bottom: 50px; /* above footer */
    z-index: 20;
    background: grey;
    color: #fff;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
    transition: left 0.3s;
}

/* Main container */
#mainContainer {
    margin-top: 80px;
    margin-left: 250px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    width: calc(100% - 250px);
    transition: margin-left 0.3s, width 0.3s;
}

/* Background names */
#backgroundNames {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
}

#backgroundNames div {
    position: absolute;
    font-size: var(--confetti-size);
    white-space: nowrap;
}

/* Picker spanning from header to footer */
#pickerDisplay {
    height: calc(100vh - 100px); /* subtract header (80px) & footer (100px) */
    border: 2px solid #ccc;
    border-radius: 8px;
    background-color: rgba(224,224,224,0.95);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 1;
    transform: scale(var(--picker-scale));
    transform-origin: center;
}

#nameReel {
    position: absolute;
    width: 100%;
    top: 0;
    left: 0;
}

#nameReel div {
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    font-size: 24px;
    transition: color 0.2s, font-size 0.2s, text-shadow 0.2s;
    white-space: nowrap;
}

#nameReel div.current {
    color: #000;
    font-size: 48px;
    font-weight: bold;
}

/* Footer for picked students */
#pickedStudentsFooter {
    width: 100%;
    height: 30px; /* reasonable height */
    overflow-y: auto;
    background-color: rgba(51,51,51,0.95);
    color: #fff;
    border-top: 2px solid #555;
    padding: 10px 20px;
    font-family: Consolas, monospace;
    position: fixed;
    bottom: 0;
    left: 0;
    z-index: 10;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

#pickedStudentsFooter div {
    background-color: #444;
    padding: 5px 10px;
    border-radius: 5px;
}

/* Dark mode */
body.dark-mode {
    background-color: #121212;
    color: #fff;
}

body.dark-mode #pickerDisplay {
    background-color: rgba(51,51,51,0.95);
    border-color: #555;
}

body.dark-mode #sidebar {
    background-color: #222;
}

body.dark-mode #backgroundNames div {
    opacity: 0.35;
    filter: brightness(0.8);
}

body.dark-mode #nameReel div.current {
    color: #fff;
}
</style>
</head>

<body>

<div class="header">
    <button id="pickStudentHeaderBtn">Pick a Student</button>
    <img src="https://clf.uk/wp-content/uploads/CLF-Logo-Transparent-White-Text.png" onclick="toggleTheme()">
</div>

<div id="sidebar">
    <h2>Student Picker</h2>

    <label>Student names</label>
    <textarea id="studentList" rows="8">Alice
Bob
Charlie
Diana
Ethan
Fiona
George
Hannah
Isaac
Julia</textarea>

    <button id="resetListBtn">Reset List</button>

    <label>Picker zoom</label>
    <input id="pickerZoom" type="range" min="0.6" max="1.4" step="0.05" value="1">

    <label>Name confetti size</label>
    <input id="confettiSize" type="range" min="24" max="72" step="2" value="48">
</div>

<button id="toggleSidebar">☰</button>

<div id="mainContainer">
    <div id="backgroundNames"></div>
    <div id="pickerDisplay">
        <div id="nameReel"></div>
    </div>
</div>

<!-- Footer for picked students -->
<div id="pickedStudentsFooter"></div>

<script>
function toggleTheme() {
    document.body.classList.toggle('dark-mode');
}

/* Sidebar toggle */
const sidebar = document.getElementById('sidebar');
const mainContainer = document.getElementById('mainContainer');
const toggleBtn = document.getElementById('toggleSidebar');

toggleBtn.onclick = () => {
    const hidden = sidebar.style.display === 'none';
    sidebar.style.display = hidden ? 'flex' : 'none';
    mainContainer.style.marginLeft = hidden ? '250px' : '0';
    mainContainer.style.width = hidden ? 'calc(100% - 250px)' : '100%';

    // Move toggle button outside the sidebar when open
    toggleBtn.style.left = hidden ? '250px' : '0';
};

/* Zoom slider */
document.getElementById('pickerZoom').oninput = e => {
    document.documentElement.style.setProperty('--picker-scale', e.target.value);
    adjustPickerWidth();
};

/* Confetti size slider */
document.getElementById('confettiSize').oninput = e => {
    document.documentElement.style.setProperty('--confetti-size', e.target.value + 'px');
    bgNames = [];
    updateBackgroundNames();
};

let originalStudents = [];
let currentStudents = [];
let bgNames = [];

const studentListTextarea = document.getElementById('studentList');
const nameReel = document.getElementById('nameReel');
const pickBtnHeader = document.getElementById('pickStudentHeaderBtn');
const resetBtn = document.getElementById('resetListBtn');
const backgroundDiv = document.getElementById('backgroundNames');
const pickedFooter = document.getElementById('pickedStudentsFooter');

const pastelColors = ['#EFA5C3','#A8E0F7','#FFF1A8','#F7A5A5'];

function updateStudentArray() {
    originalStudents = studentListTextarea.value.split('\n').map(s => s.trim()).filter(Boolean);
    currentStudents = [...originalStudents];
    populateReel(currentStudents, 0);
    adjustPickerWidth();
    bgNames = [];
    updateBackgroundNames();
}

function adjustPickerWidth() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    let maxWidth = 100;
    currentStudents.forEach(name => {
        ctx.font = '24px Consolas';
        const normalWidth = ctx.measureText(name).width;
        ctx.font = '48px Consolas';
        const highlightWidth = ctx.measureText(name).width;
        const width = Math.max(normalWidth, highlightWidth) + 40;
        if (width > maxWidth) maxWidth = width;
    });

    const sidebarWidth = sidebar.style.display === 'none' ? 0 : sidebar.offsetWidth;
    const maxAllowed = window.innerWidth - sidebarWidth - 20;
    maxWidth = Math.min(maxWidth, maxAllowed);

    document.getElementById('pickerDisplay').style.width = maxWidth + 'px';
}

function populateReel(names, highlightIndex) {
    nameReel.innerHTML = '';
    names.forEach((name, idx) => {
        const div = document.createElement('div');
        div.textContent = name;
        if (idx === highlightIndex) div.classList.add('current');
        nameReel.appendChild(div);
    });
}

function updateBackgroundNames() {
    const sidebarWidth = sidebar.style.display === 'none' ? 0 : sidebar.offsetWidth;
    const visibleWidth = window.innerWidth - sidebarWidth;
    const visibleHeight = window.innerHeight - 80;

    const baseSize = 48;
    const confettiSize = parseFloat(getComputedStyle(document.documentElement)
        .getPropertyValue('--confetti-size'));
    const densityMultiplier = baseSize / confettiSize;

    const baseNeeded = Math.ceil(visibleHeight / 50) * Math.ceil(visibleWidth / 200);
    const needed = Math.ceil(baseNeeded * densityMultiplier);

    while (bgNames.length < needed && currentStudents.length) {
        const name = currentStudents[Math.floor(Math.random() * currentStudents.length)];
        bgNames.push({
            name,
            x: Math.random() * visibleWidth + sidebarWidth,
            y: Math.random() * visibleHeight,
            dx: (Math.random() * 0.5 + 0.1) * (Math.random() < 0.5 ? -1 : 1),
            dy: (Math.random() * 0.5 + 0.1) * (Math.random() < 0.5 ? -1 : 1),
            color: pastelColors[Math.floor(Math.random() * pastelColors.length)]
        });
    }

    bgNames.length = Math.min(bgNames.length, needed);
}

function animateBackground() {
    const sidebarWidth = sidebar.style.display === 'none' ? 0 : sidebar.offsetWidth;
    backgroundDiv.innerHTML = '';

    bgNames.forEach(obj => {
        obj.x += obj.dx;
        obj.y += obj.dy;

        if (obj.x > window.innerWidth) obj.x = sidebarWidth - 200;
        if (obj.x < sidebarWidth - 200) obj.x = window.innerWidth;
        if (obj.y > window.innerHeight) obj.y = -50;
        if (obj.y < -50) obj.y = window.innerHeight;

        const div = document.createElement('div');
        div.textContent = obj.name;
        div.style.left = obj.x + 'px';
        div.style.top = obj.y + 'px';
        div.style.color = obj.color;
        backgroundDiv.appendChild(div);
    });

    requestAnimationFrame(animateBackground);
}

/* Picker logic */
pickBtnHeader.onclick = () => {
    if (currentStudents.length === 0) {
        alert("No students left to pick!");
        return;
    }
    pickBtnHeader.disabled = true;

    const pickedIndex = Math.floor(Math.random() * currentStudents.length);
    const reelNames = [];
    for (let i = 0; i < 30; i++) reelNames.push(...currentStudents);
    populateReel(reelNames, 0);

    const displayHeight = document.getElementById('pickerDisplay').clientHeight;
    const middleOffset = Math.floor(displayHeight / 2 / 50);
    const finalIndex = pickedIndex + currentStudents.length * 15;
    const finalOffset = -(finalIndex - middleOffset) * 50;
    const duration = 4000;
    let start = null;

    function animate(timestamp) {
        if (!start) start = timestamp;
        let progress = (timestamp - start) / duration;
        if (progress > 1) progress = 1;
        progress = 1 - Math.pow(1 - progress, 3);

        nameReel.style.transform = `translateY(${progress * finalOffset}px)`;

        const current = Math.round(
            -parseFloat(nameReel.style.transform.replace('translateY(', '').replace('px)', '')) / 50
        ) + middleOffset;

        nameReel.childNodes.forEach((div, idx) => {
            if (idx === current) {
                div.classList.add('current');
                const glow = pastelColors[Math.floor(Math.random() * pastelColors.length)];
                div.style.textShadow = `0 0 8px ${glow}, 0 0 16px ${glow}, 0 0 24px ${glow}, 0 0 32px ${glow}`;
            } else {
                div.classList.remove('current');
                div.style.textShadow = '';
            }
        });

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            const pickedName = currentStudents.splice(pickedIndex, 1)[0];
            studentListTextarea.value = currentStudents.join('\n');
            bgNames = bgNames.filter(obj => obj.name !== pickedName);
            updateBackgroundNames();
            pickBtnHeader.disabled = false;

            const newDiv = document.createElement('div');
            newDiv.textContent = pickedName;
            pickedFooter.appendChild(newDiv);
            pickedFooter.scrollTop = pickedFooter.scrollHeight;
        }
    }
    requestAnimationFrame(animate);
};

/* Reset */
resetBtn.onclick = () => {
    updateStudentArray();
    pickedFooter.innerHTML = '';
};
studentListTextarea.addEventListener('input', updateStudentArray);

updateStudentArray();
animateBackground();
</script>

</body>
</html>
