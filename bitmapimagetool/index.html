<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grayscale Bit Depth Tool</title>

<style>
body {
    font-family: Consolas, monospace;
    margin: 0;
    background: #f5f5f5;
}

.header {
    height: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #333;
}

.header h1 { color: #fff; }

.main-wrapper {
    max-width: 1000px;
    margin: 30px auto;
    padding: 0 20px;
}

.card {
    display: flex;
    gap: 25px;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

/* LEFT */
.controls { width: 320px; }

label { display:block; margin-top:10px; }

input {
    width:100%;
    margin-top:5px;
    margin-bottom:15px;
}

/* RIGHT */
.preview {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    border: 1px solid #ddd;
    border-radius: 10px;
    background: #fafafa;

    position: relative;
    cursor: grab;
}

.preview:active {
    cursor: grabbing;
}

/* IMPORTANT: transform now controlled by JS */
.canvas-wrapper {
    width: 600px;
    height: 400px;
    transform-origin: center;
}

canvas {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
}

/* INFO BOX */
#info {
    position: absolute;
    top: 10px;
    left: 10px;

    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 10px;
    font-size: 13px;
    border-radius: 6px;

    pointer-events: none;
    z-index: 10;
}
</style>
</head>

<body>

<div class="header">
    <h1>Mx Brooke's Bitmap Images Tool</h1>
</div>

<div class="main-wrapper">

<div class="card">

<!-- LEFT -->
<div class="controls">

<h2>Controls</h2>

<input type="file" id="fileInput" accept="image/*">

<label>Bit Depth: <span id="bitVal">4</span></label>
<input type="range" id="bitDepth" min="1" max="16" value="4">

<label>Resolution: <span id="resVal">100</span>%</label>
<input type="range" id="resolution" min="10" max="100" value="100">

<label>Zoom: <span id="zoomVal">100</span>%</label>
<input type="range" id="zoom" min="10" max="300" value="100">

</div>

<!-- RIGHT -->
<div class="preview" id="preview">

<div id="info"></div>

<div class="canvas-wrapper" id="wrapper">
    <canvas id="canvas"></canvas>
</div>

</div>

</div>
</div>

<script>

let img = new Image();

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const wrapper = document.getElementById("wrapper");
const preview = document.getElementById("preview");

const DISPLAY_W = 600;
const DISPLAY_H = 400;

canvas.width = DISPLAY_W;
canvas.height = DISPLAY_H;

/* =========================
   DRAG STATE
========================= */
let isDragging = false;
let startX = 0;
let startY = 0;
let offsetX = 0;
let offsetY = 0;

/* DRAG EVENTS */
preview.addEventListener("mousedown", e => {
    isDragging = true;
    startX = e.clientX - offsetX;
    startY = e.clientY - offsetY;
});

window.addEventListener("mousemove", e => {
    if(!isDragging) return;

    offsetX = e.clientX - startX;
    offsetY = e.clientY - startY;

    updateTransform();
});

window.addEventListener("mouseup", () => {
    isDragging = false;
});

/* APPLY TRANSFORM */
function updateTransform(){
    const zoom = document.getElementById("zoom").value / 100;

    wrapper.style.transform =
        `translate(${offsetX}px, ${offsetY}px) scale(${zoom})`;
}

/* FILE LOAD */
document.getElementById("fileInput").onchange = e => {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = ev => {
        img = new Image();
        img.src = ev.target.result;
        img.onload = updateImage;
    };
    reader.readAsDataURL(file);
};

/* LIVE CONTROLS */
["bitDepth","resolution"].forEach(id=>{
    document.getElementById(id).oninput = updateImage;
});

/* ZOOM */
document.getElementById("zoom").oninput = function(){
    document.getElementById("zoomVal").innerText = this.value;
    updateTransform();
};

function updateImage(){

    if(!img.src) return;

    const bitDepth = +document.getElementById("bitDepth").value;
    const resolution = +document.getElementById("resolution").value;

    document.getElementById("bitVal").innerText = bitDepth;
    document.getElementById("resVal").innerText = resolution;

    const scale = resolution / 100;

    const tempW = Math.max(1, Math.floor(DISPLAY_W * scale));
    const tempH = Math.max(1, Math.floor(DISPLAY_H * scale));

    const off = document.createElement("canvas");
    const octx = off.getContext("2d");

    off.width = tempW;
    off.height = tempH;

    octx.drawImage(img, 0, 0, tempW, tempH);

    const imageData = octx.getImageData(0,0,tempW,tempH);
    const data = imageData.data;

    const levels = Math.pow(2, bitDepth);
    const step = 255 / (levels - 1);

    for(let i=0;i<data.length;i+=4){

        const gray =
            0.299*data[i] +
            0.587*data[i+1] +
            0.114*data[i+2];

        const q = Math.round(gray / step) * step;

        data[i]=data[i+1]=data[i+2]=q;
    }

    octx.putImageData(imageData,0,0);

    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(off, 0, 0, canvas.width, canvas.height);

    updateInfo(bitDepth, tempW, tempH);
}

/* INFO */
function updateInfo(bitDepth, w, h){

    const pixels = w * h;
    const shades = Math.pow(2, bitDepth);

    document.getElementById("info").innerHTML = `
        <b>Mode:</b> Grayscale<br>
        <b>Bit Depth:</b> ${bitDepth}-bit<br>
        <b>Theoretical Shades:</b> ${shades}<br>
        <b>Resolution:</b> ${w} × ${h}<br>
        <b>Pixels:</b> ${pixels.toLocaleString()}
    `;
}

/* init transform */
updateTransform();

</script>

</body>
</html>
