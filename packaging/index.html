<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Packaging Editor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #1e1e1e;
    color: white;
    overflow: hidden;
}

/* =========================
   MAIN LAYOUT
========================= */
.main {
    display: flex;
    height: 100vh;
}

/* =========================
   LEFT SIDEBAR (TOOLS BACK)
========================= */
.sidebar {
    width: 280px;
    background: #252525;
    padding: 10px;
    overflow-y: auto;
}

.section {
    background: #2f2f2f;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
}

button {
    margin: 3px;
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    background: #444;
    color: white;
    cursor: pointer;
}

/* =========================
   CENTER NET
========================= */
.center {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.net {
    display: grid;
    grid-template-columns: repeat(4, auto);
    grid-template-rows: repeat(3, auto);
    gap: 10px;
}

canvas {
    border: 2px solid #444;
    background: white;
}

/* CROSS LAYOUT */
#top    { grid-column: 2; grid-row: 1; }

#left   { grid-column: 1; grid-row: 2; }
#front  { grid-column: 2; grid-row: 2; }
#right  { grid-column: 3; grid-row: 2; }
#back   { grid-column: 4; grid-row: 2; }

#bottom { grid-column: 2; grid-row: 3; }

/* =========================
   SMALL 3D WIDGET (TOP RIGHT)
========================= */
#viewerWidget {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 220px;
    height: 220px;
    background: #111;
    border: 1px solid #555;
    z-index: 100;
}

#viewer {
    width: 100%;
    height: 100%;
}

#expandBtn {
    position: absolute;
    top: 5px;
    right: 5px;
    z-index: 101;
    font-size: 12px;
    padding: 4px 6px;
    background: #333;
    border: 1px solid #666;
    cursor: pointer;
}

/* =========================
   FULLSCREEN 3D POPUP
========================= */
#popup3D {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    z-index: 999;
}

#popupViewer {
    width: 100%;
    height: 100%;
}

#closePopup {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 1000;
    padding: 8px 10px;
    background: #333;
    border: 1px solid #666;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="main">

<!-- ================= SIDEBAR RESTORED ================= -->
<div class="sidebar">

<div class="section">
<h3>Tools</h3>
<button onclick="tool='brush'">Brush</button>
<button onclick="tool='fill'">Fill</button>
<button onclick="tool='rect'">Rect</button>
<button onclick="tool='circle'">Circle</button>
<button onclick="tool='text'">Text</button>
<button onclick="tool='eyedropper'">Eyedropper</button>
</div>

<div class="section">
<h3>Color</h3>
<input type="color" id="color" value="#ff0000">
</div>

<div class="section">
<h3>Box Size</h3>
Width <input id="w" type="range" min="1" max="5" value="2"><br>
Height <input id="h" type="range" min="1" max="5" value="2"><br>
Depth <input id="d" type="range" min="1" max="5" value="2">
</div>

</div>

<!-- ================= NET ================= -->
<div class="center">
<div class="net">

<canvas id="top"></canvas>

<canvas id="left"></canvas>
<canvas id="front"></canvas>
<canvas id="right"></canvas>
<canvas id="back"></canvas>

<canvas id="bottom"></canvas>

</div>
</div>

</div>

<!-- ================= SMALL 3D WIDGET ================= -->
<div id="viewerWidget">

<button id="expandBtn" onclick="openPopup()">⤢</button>
<div id="viewer"></div>

</div>

<!-- ================= FULLSCREEN 3D ================= -->
<div id="popup3D">

<button id="closePopup" onclick="closePopup()">✕</button>
<div id="popupViewer"></div>

</div>

<script>

/* =========================
   STATE
========================= */

const box = { w: 2, h: 2, d: 2 };
const BASE = 120;
let tool = "brush";

const ids = ["top","left","front","right","back","bottom"];

const canvases = {};
const ctxs = {};
const textures = {};

/* =========================
   CANVASES
========================= */

ids.forEach(id => {

    const c = document.getElementById(id);
    const ctx = c.getContext("2d");

    canvases[id] = c;
    ctxs[id] = ctx;

    const tex = new THREE.CanvasTexture(c);
    textures[id] = tex;

    let drawing = false;
    let sx, sy;

    c.addEventListener("mousedown", e => {

        const r = c.getBoundingClientRect();
        sx = e.clientX - r.left;
        sy = e.clientY - r.top;

        drawing = true;

        if (tool === "fill") {
            ctx.fillStyle = getColor();
            ctx.fillRect(0,0,c.width,c.height);
            tex.needsUpdate = true;
        }

        if (tool === "text") {
            const t = prompt("Text?");
            if (t) {
                ctx.fillStyle = getColor();
                ctx.font = "16px Arial";
                ctx.fillText(t,sx,sy);
                tex.needsUpdate = true;
            }
        }
    });

    c.addEventListener("mouseup", e => {

        drawing = false;

        const r = c.getBoundingClientRect();
        const x = e.clientX - r.left;
        const y = e.clientY - r.top;

        ctx.fillStyle = getColor();

        if (tool === "rect") {
            ctx.fillRect(sx,sy,x-sx,y-sy);
        }

        if (tool === "circle") {
            const dx = x-sx;
            const dy = y-sy;
            ctx.beginPath();
            ctx.arc(sx,sy,Math.sqrt(dx*dx+dy*dy),0,Math.PI*2);
            ctx.fill();
        }

        tex.needsUpdate = true;
    });

    c.addEventListener("mousemove", e => {

        if (!drawing || tool !== "brush") return;

        const r = c.getBoundingClientRect();
        const x = e.clientX - r.left;
        const y = e.clientY - r.top;

        ctx.fillStyle = getColor();
        ctx.beginPath();
        ctx.arc(x,y,2,0,Math.PI*2);
        ctx.fill();

        textures[id].needsUpdate = true;
    });
});

/* =========================
   NET RESIZE
========================= */

function resizeNet() {

    const faces = {
        top:    { w: box.w, h: box.d },
        bottom: { w: box.w, h: box.d },
        left:   { w: box.d, h: box.h },
        right:  { w: box.d, h: box.h },
        front:  { w: box.w, h: box.h },
        back:   { w: box.w, h: box.h }
    };

    for (let id of ids) {

        const c = canvases[id];
        const ctx = ctxs[id];

        const w = faces[id].w * BASE;
        const h = faces[id].h * BASE;

        const scale = window.devicePixelRatio || 1;

        c.style.width = w + "px";
        c.style.height = h + "px";

        c.width = w * scale;
        c.height = h * scale;

        ctx.setTransform(scale,0,0,scale,0,0);
    }
}

/* =========================
   THREE JS (SHARED SCENE)
========================= */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2b2b2b);

const camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
camera.position.set(4,4,6);

const renderer = new THREE.WebGLRenderer({ antialias:true });
document.getElementById("viewer").appendChild(renderer.domElement);

const popupRenderer = new THREE.WebGLRenderer({ antialias:true });
document.getElementById("popupViewer").appendChild(popupRenderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
const popupControls = new THREE.OrbitControls(camera, popupRenderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

let cube;

function buildCube() {

    if (cube) scene.remove(cube);

    const mats = ids.map(id =>
        new THREE.MeshBasicMaterial({ map: textures[id] })
    );

    cube = new THREE.Mesh(
        new THREE.BoxGeometry(box.w,box.h,box.d),
        mats
    );

    scene.add(cube);
}

/* =========================
   VIEW CONTROLS
========================= */

function resizeAll() {

    const w1 = viewer.clientWidth;
    const h1 = viewer.clientHeight;

    renderer.setSize(w1,h1);
    camera.aspect = w1/h1;
    camera.updateProjectionMatrix();

    const w2 = popupViewer.clientWidth;
    const h2 = popupViewer.clientHeight;

    popupRenderer.setSize(w2,h2);
}

window.addEventListener("resize", resizeAll);

/* =========================
   POPUP LOGIC
========================= */

function openPopup() {
    document.getElementById("popup3D").style.display = "block";
    resizeAll();
}

function closePopup() {
    document.getElementById("popup3D").style.display = "none";
}

/* =========================
   HELPERS
========================= */

function getColor() {
    return document.getElementById("color").value;
}

/* =========================
   UI
========================= */

function update() {
    resizeNet();
    buildCube();
    resizeAll();
}

w.oninput = e => { box.w=+e.target.value; update(); };
h.oninput = e => { box.h=+e.target.value; update(); };
d.oninput = e => { box.d=+e.target.value; update(); };

/* =========================
   LOOP (IMPORTANT FIX)
========================= */

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    popupControls.update(); // 🔥 keeps popup fully interactive
    renderer.render(scene,camera);
    popupRenderer.render(scene,camera);
}

update();
animate();

</script>

</body>
</html>
