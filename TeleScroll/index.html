<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter with Chunked Loading + Search</title>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/gh/antijingoist/open-dyslexic/woff/OpenDyslexic-Regular.woff') format('woff');
}

body {
  margin:0; padding:0;
  font-family: Arial, sans-serif;
  display:flex;
  height:100vh;
  overflow:hidden;
  background:#f4f4f4;
}

#panel {
  width:280px;
  background:#fff;
  border-right:2px solid #ccc;
  padding:20px;
  overflow-y:auto;
  transition: transform .3s ease, width .3s ease;
}

#panel.collapsed {
  transform: translateX(-100%);
  width:0;
  padding:0;
  border:none;
}

#panel label { margin-top:15px; display:block; font-weight:bold; }
#panel input, #panel select { width:100%; margin-top:5px; padding:5px; }

#togglePanel {
  position:absolute; bottom:10px; left:10px;
  background:#007bff; color:white;
  padding:10px 15px; cursor:pointer;
  border-radius:6px; font-size:1.1em;
}

#main {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:stretch;
  padding:5px;
  transition: padding-left .3s ease;
}

#display {
  flex:1;
  background:white;
  border-radius:10px;
  padding:10px;
  overflow-y:auto;
  font-size:1.6em;
  line-height:2em;
}

.line { margin-bottom:10px; transition:font-size .2s ease; }
.active { font-weight:bold; }
</style>
</head>

<body>

<div id="panel">
<h3>Settings</h3>

<label>Choose File</label>
<input type="file" id="fileInput" accept=".txt">

<label>Search Text</label>
<input type="text" id="searchBox" placeholder="Type text to find...">
<button id="searchBtn">Go</button>

<label>Font Family</label>
<select id="fontFamily">
  <option value="Arial">Arial</option>
  <option value="Helvetica">Helvetica</option>
  <option value="'Lexend', sans-serif">Lexend</option>
  <option value="'OpenDyslexic', sans-serif">OpenDyslexic</option>
</select>

<label>Font Size</label>
<input type="range" id="fontSize" min="1" max="10" step="0.1" value="1.6">

<label>Line Height</label>
<input type="range" id="lineHeight" min="1" max="10" step="0.1" value="2">

<label>Letter Spacing</label>
<input type="range" id="kerning" min="0" max="10" step="0.5" value="0">

<label>Active Color</label>
<input type="color" id="textColor" value="#000000">

<label>Defocus Color</label>
<input type="color" id="defocusColor" value="#b0b0b0">

<label>Background Color</label>
<input type="color" id="bgColor" value="#ffffff">

<label>Scroll Speed (higher=slower)</label>
<input type="range" id="scrollSpeed" min="1" max="20" value="10">
</div>

<div id="togglePanel">☰</div>

<div id="main">
  <div id="display"></div>
</div>

<audio id="clickSound">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<script>
//ELEMENTS
const display = document.getElementById("display");
const fileInput = document.getElementById("fileInput");
const searchBox = document.getElementById("searchBox");
const searchBtn = document.getElementById("searchBtn");
const toggleBtn = document.getElementById("togglePanel");
const panel = document.getElementById("panel");
const main = document.getElementById("main");

//SETTINGS
const fontFamilyInput=document.getElementById('fontFamily');
const fontSizeInput=document.getElementById('fontSize');
const lineHeightInput=document.getElementById('lineHeight');
const kerningInput=document.getElementById('kerning');
const bgColorInput=document.getElementById('bgColor');
const textColorInput=document.getElementById('textColor');
const defocusColorInput=document.getElementById('defocusColor');
const scrollSpeedInput=document.getElementById('scrollSpeed');

const clickSound=document.getElementById('clickSound');

let lines = [];
let currentIndex = 0;
let scrollFactor = parseInt(scrollSpeedInput.value);

let fileObj=null, reader=null;
let fileOffset=0, fileSize=0;
const chunkSize = 50000;

//UTILITIES
function playClick() {
  clickSound.currentTime=0;
  clickSound.play().catch(()=>{});
}
function splitSentences(t) {
  return t.replace(/\n+/g, " ").split(/(?<=[.!?])\s+/).filter(x=>x.trim());
}

//CHUNKING
function loadNextChunk(cb){
  if(fileOffset >= fileSize){
    if(cb) cb();
    return;
  }

  const blob = fileObj.slice(fileOffset, fileOffset + chunkSize);
  reader = new FileReader();
  reader.onload = e => {
    const newLines = splitSentences(e.target.result || "");
    if(newLines.length > 0) lines = lines.concat(newLines);

    fileOffset += chunkSize;
    render();
    if(cb) cb();
  };
  reader.readAsText(blob);
}

//RENDER
function render(){
  const baseSize = parseFloat(fontSizeInput.value);
  display.innerHTML = "";

  lines.forEach((text,i)=>{
    const div = document.createElement("div");
    div.classList.add("line");
    div.textContent = text;

    if(i === currentIndex){
      div.classList.add("active");
      div.style.color = textColorInput.value;
    } else {
      div.style.color = defocusColorInput.value;
    }

    // SAME size for ALL lines — no zoom effect
    div.style.fontSize = baseSize + "em";

    display.appendChild(div);
  });
}

//AUTO_SCROLL
function updateScroll(){
  const active = document.querySelector(".active");
  if(active){
    const target = active.offsetTop - display.clientHeight/2 + active.clientHeight/2;
    const dist = target - display.scrollTop;

    const t = (20 - scrollFactor + 1) / 20;
    const ease = t*t*t;

    display.scrollTop += dist * ease;
  }
  requestAnimationFrame(updateScroll);
}
updateScroll();

//NAVIGATION
document.addEventListener("keydown", e=>{
  if(e.key === "ArrowDown"){
    if(currentIndex < lines.length - 1){
      currentIndex++;
      render();
    } else {
      loadNextChunk(()=>{ currentIndex++; render(); });
    }
  }

  if(e.key === "ArrowUp" && currentIndex > 0){
    currentIndex--;
    render();
  }
});

//SEARCH
function jumpToMatch(q){
  q = q.toLowerCase();
  const idx = lines.findIndex(l => l.toLowerCase().includes(q));
  if(idx !== -1){
    currentIndex = idx;
    render();
    return true;
  }
  return false;
}

function progressiveSearch(q){
  function attempt(){
    if(jumpToMatch(q)) return;

    if(fileOffset < fileSize){
      loadNextChunk(attempt);
    } else {
      alert("Not found.");
    }
  }
  attempt();
}

searchBtn.addEventListener("click", ()=>{
  const q = searchBox.value.trim();
  if(q.length > 0) progressiveSearch(q);
});

//LOAD_FILE
fileInput.addEventListener("change", ()=>{
  fileObj = fileInput.files[0];
  if(!fileObj) return;

  fileSize = fileObj.size;
  fileOffset = 0;
  lines = [];
  currentIndex = 0;

  loadNextChunk();
});

//STYLE_SETTINGS
[fontFamilyInput,fontSizeInput,lineHeightInput,kerningInput,bgColorInput,textColorInput,defocusColorInput,scrollSpeedInput]
.forEach(el=>{
  el.addEventListener("input", ()=>{
    playClick();
    display.style.fontFamily = fontFamilyInput.value;
    display.style.lineHeight = lineHeightInput.value + "em";
    display.style.letterSpacing = kerningInput.value + "px";
    display.style.backgroundColor = bgColorInput.value;
    scrollFactor = parseInt(scrollSpeedInput.value);
    render();
  });
});

//PANEL_TOGGLE
toggleBtn.addEventListener("click", ()=>{
  panel.classList.toggle("collapsed");
  main.style.paddingLeft = panel.classList.contains("collapsed") ? "5px" : "20px";
});
</script>

</body>
</html>
